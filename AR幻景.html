function loop(t, frame) {
    const timeSec = t / 1000;
    waterMaterials.forEach(m => { if(m.uniforms && m.uniforms.uTime) m.uniforms.uTime.value = timeSec; });
    animatedTrees.forEach(m => { if(m.uniforms) m.uniforms.uTime.value = timeSec; }); 
    butterflies.forEach(b => b.update(timeSec));
    windyGrassClusters.forEach(cluster => {
        const windX = Math.sin(timeSec * 2 + cluster.userData.phase) * 0.05;
        const windZ = Math.cos(timeSec * 1.5 + cluster.userData.phase) * 0.03;
        cluster.rotation.x = windX + 0.1; cluster.rotation.z = windZ;
    });
    lotusClusters.forEach(cluster => {
        cluster.children.forEach(stalk => {
            if (stalk.userData.swayPhase !== undefined) {
                const windX = Math.sin(timeSec * 1.5 + stalk.userData.swayPhase) * 0.04;
                const windZ = Math.cos(timeSec * 1.1 + stalk.userData.swayPhase) * 0.03;
                stalk.rotation.x = stalk.userData.baseRotX + windX;
                stalk.rotation.z = stalk.userData.baseRotZ + windZ;
            }
        });
    });
    if (frame && !isPreviewMode) {
        const refSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();
        if (!hitTestSource) { session.requestReferenceSpace('viewer').then(s => { session.requestHitTestSource({ space: s }).then(src => hitTestSource = src); }); }
        if (hitTestSource) {
            const hits = frame.getHitTestResults(hitTestSource);
            if (hits.length > 0) {
                const pose = hits[0].getPose(refSpace);
                lastHitPose = pose; reticleMarker.visible = true;
                reticleMarker.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
                groundLevel = pose.transform.position.y;
                shadowCatcherPlane.position.y = groundLevel; 
                if (isDrawing && currentMode === 'path') {
                    const pos = reticleMarker.position.clone();
                    if (pathPoints.length === 0 || pos.distanceTo(pathPoints[pathPoints.length-1]) > 0.05) { pathPoints.push(pos); updatePreviewLine(); }
                }
            } else { reticleMarker.visible = false; }
        }
    }
    for (let i = fadingLines.length - 1; i >= 0; i--) {
        fadingLines[i].material.opacity -= 0.02;

}

function createLotusLeaf(radius, isFloating) {
    const leaf = new THREE.Group();
    const segs = 48; 
    const geo = new THREE.CircleGeometry(radius, segs);
    const pos = geo.attributes.position;
    for(let p=0; p<pos.count; p++) {
        let x = pos.getX(p); 
        let y = pos.getY(p);
        if (x === 0 && y === 0) continue; 
        const angle = Math.atan2(y, x);
        const dist = Math.sqrt(x*x + y*y);
        const normalizedDist = dist / radius;
        const radiusNoise = 1.0 + Math.sin(angle * 4) * 0.03 + Math.cos(angle * 7) * 0.02;
        x = Math.cos(angle) * (dist * radiusNoise);
        y = Math.sin(angle) * (dist * radiusNoise);
        pos.setXY(p, x, y);
        let z = 0;
        if(isFloating) {
            z = Math.pow(normalizedDist, 2) * 0.03 + Math.sin(angle * 8) * 0.005 * normalizedDist;
        } else {
            z = Math.pow(normalizedDist, 1.5) * (radius * 0.25); 
            const wave1 = Math.sin(angle * 6) * (radius * 0.06) * Math.pow(normalizedDist, 2); 
            const wave2 = Math.cos(angle * 11) * (radius * 0.02) * normalizedDist; 
            z += wave1 + wave2;
            if (normalizedDist < 0.1) {
                z -= (0.1 - normalizedDist) * 0.05;
            }
        }
        pos.setZ(p, z);
    }
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, MATS.lotusLeaf);
    mesh.rotation.x = -Math.PI/2;
    leaf.add(mesh);
    return leaf;
}
function create3DPetalGeometry(width, length, depth) {
    const segments = 16;
    const geo = new THREE.BufferGeometry();
    const vertices = []; const uvs = []; const indices = [];
    for (let i = 0; i <= segments; i++) {
        const v = i / segments; 
        for (let j = 0; j <= segments; j++) {
            const u = j / segments; 
            const wProfile = Math.sin(v * Math.PI) * (1.0 - Math.pow(v, 2) * 0.4); 
            const x = (u - 0.5) * width * wProfile;
            const y = v * length;
            const zProfile = Math.sin(u * Math.PI); 
            const zBend = Math.sin(v * Math.PI) * depth; 
            const z = zProfile * (width * 0.15) - zBend;
            vertices.push(x, y, z); uvs.push(u, v);
        }
    }
    for (let i = 0; i < segments; i++) {
        for (let j = 0; j < segments; j++) {
            const a = i * (segments + 1) + j;
            const b = a + 1; const c = a + (segments + 1); const d = c + 1;
            indices.push(a, b, d); indices.push(a, d, c);
        }
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices); geo.computeVertexNormals();
    return geo;
}

                const pos = new THREE.Vector3(item.pos.x, groundLevel + item.pos.y, item.pos.z);
                if (item.isModel) {
                    createObject(item.id, pos); const last = placedObjects[placedObjects.length - 1];
                    last.rotation.set(item.rot.x, item.rot.y, item.rot.z); last.scale.set(item.scale.x, item.scale.y, item.scale.z);
                } else if (item.isPaving) {
                    pathPoints = item.points.map(p => new THREE.Vector3(p.x, groundLevel + (p.y || 0), p.z));
                    if (item.isFence) { document.getElementById('path-spacing').value = item.spacing * 1000; generateContinuousRailing(); } 
                    else if (item.isPathObj) {
                        document.getElementById('path-spacing').value = item.spacing * 1000; const mockAsset = ASSETS.path.find(a => a.modelId === item.modelId);
                        currentAsset = mockAsset || currentAsset; generatePathModels();
                    } else if (item.isPondWithEdge) {
                        document.getElementById('path-spacing').value = item.spacing * 1000; const mockAsset = ASSETS.path.find(a => a.id === item.assetId);
                        currentAsset = mockAsset || currentAsset; generateStonePond();
                    } else if (item.isCurbWithFill) {
                        document.getElementById('path-spacing').value = item.spacing * 1000; const mockAsset = ASSETS.path.find(a => a.id === item.assetId);
                        currentAsset = mockAsset || currentAsset; generateCurbWithFill();
                    } else {
                        const mockAsset = ASSETS.path.find(a => a.id === item.assetId); currentAsset = mockAsset || currentAsset; generatePaving();
                    }
                }
            });
            alert("幻景读取成功！"); renderAssetList();
        } catch (err) { alert("文件解析失败，请确保文件格式正确。"); }
    };
    reader.readAsText(file);
}
function createNaturalPondStone(length, width, height) {
    const segs = 8;
    const geo = new THREE.BoxGeometry(length, height, width, segs, segs, segs);
    const pos = geo.attributes.position;
    const roundness = 0.4; 
    const hash = (x, y, z) => {
        return Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453 % 1;
    };
    const slopeX = (Math.random() - 0.5) * 0.3;
    const slopeZ = (Math.random() - 0.5) * 0.3;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let y = pos.getY(i);
        let z = pos.getZ(i);
        const v = new THREE.Vector3(x, y, z);
        const sphereV = v.clone().normalize();
        sphereV.x *= length / 2;
        sphereV.y *= height / 2;
        sphereV.z *= width / 2;
        v.lerp(sphereV, roundness);
        x = v.x; y = v.y; z = v.z;
        const nx = x / (length / 2);
        const nz = z / (width / 2);
        const ny = y / (height / 2); 
        if (ny > 0.5) {
            const macroNoise = hash(x * 4, 0, z * 4) * 0.4;
            const slopeHeight = (nx * slopeX + nz * slopeZ) * height;
            y += (macroNoise - 0.2) * height * 0.4 + slopeHeight;
        }
        if (ny > -0.8 && ny < 0.8) {
            x += (hash(0, y * 6, z * 6) - 0.5) * length * 0.05;
            z += (hash(x * 6, y * 6, 0) - 0.5) * width * 0.05;
        }
        pos.setXYZ(i, x, y, z);
    }
    geo.computeVertexNormals();
    geo.translate(0, height / 2, 0);
    return geo;
}
function getRandomPondStoneMaterial() {
    const baseColors = ['#8e9e9d', '#9b9b9b', '#858f8c', '#a3a3a3', '#7a8280'];
    const hex = baseColors[Math.floor(Math.random() * baseColors.length)];
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = hex;
    ctx.fillRect(0, 0, 256, 256);
    for(let i=0; i<40; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
        ctx.beginPath();
        ctx.arc(Math.random()*256, Math.random()*256, 10 + Math.random()*25, 0, Math.PI*2);
        ctx.fill();
    }
    for(let i=0; i<1500; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.2)';
        ctx.fillRect(Math.random()*256, Math.random()*256, 1.5, 1.5);
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    const color = new THREE.Color(hex);
    color.offsetHSL((Math.random()-0.5)*0.04, (Math.random()-0.5)*0.08, (Math.random()-0.5)*0.08);
    return new THREE.MeshStandardMaterial({
        map: tex,
        color: color, 
        roughness: 0.75 + Math.random()*0.15, 
        bumpMap: MATS.stone.bumpMap, 
        bumpScale: 0.015 + Math.random()*0.015 
    });
}
function generateStonePond() {
    if (pathPoints.length < 3) return;
    const group = new THREE.Group();
    group.userData.isPaving = true;
    group.userData.isPondWithEdge = true;
    group.userData.assetId = currentAsset.id;
    group.userData.points = pathPoints.map(p => ({x:p.x, y:p.y-groundLevel, z:p.z}));
    const spacingM = (parseFloat(document.getElementById('path-spacing').value) || 250) / 1000;
    group.userData.spacing = spacingM;
    const pts2d = pathPoints.map(p => new THREE.Vector2(p.x, p.z));
    const shape = new THREE.Shape(pts2d);
    const geo = new THREE.ShapeGeometry(shape);
    const waterMat = new THREE.ShaderMaterial({ 
        uniforms: THREE.UniformsUtils.clone(ClearPondShader.uniforms), 
        vertexShader: ClearPondShader.vertexShader, fragmentShader: ClearPondShader.fragmentShader, 
        transparent: true, side: THREE.DoubleSide 
    });
    waterMaterials.push(waterMat);
    const waterMesh = new THREE.Mesh(geo, waterMat);
    waterMesh.rotation.x = Math.PI / 2;
    waterMesh.position.y = 0.01; 
    waterMesh.receiveShadow = true;
    waterMesh.userData.isWater = true;
    group.add(waterMesh);
    const closedPoints = [...pathPoints, pathPoints[0]]; 
    let totalLen = 0;
    let segmentLengths = [0];
    for(let i=0; i<closedPoints.length-1; i++) {
        totalLen += closedPoints[i].distanceTo(closedPoints[i+1]);
        segmentLengths.push(totalLen);
    }
    const stoneCount = Math.max(4, Math.round(totalLen / spacingM));
    const actualStep = totalLen / stoneCount; 
    for (let i = 0; i < stoneCount; i++) {
        const currentDist = i * actualStep;
        let segIdx = 0;
        for(let j=0; j<segmentLengths.length-1; j++) {
            if(currentDist >= segmentLengths[j] && currentDist <= segmentLengths[j+1]) {
                segIdx = j; break;
            }
        }
        const p1 = closedPoints[segIdx];
        const p2 = closedPoints[segIdx+1];
        const t = (currentDist - segmentLengths[segIdx]) / (p1.distanceTo(p2) || 1);
        const pos = new THREE.Vector3().lerpVectors(p1, p2, t);
        const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
        const normal = new THREE.Vector3(-dir.z, 0, dir.x).normalize(); 
        const baseSize = actualStep * (0.95 + Math.random() * 0.1); 
        const stoneLen = baseSize * (0.9 + Math.random() * 0.3); 
        const stoneWidth = baseSize * (0.8 + Math.random() * 0.4); 
        const baseHeight = 0.06;
        const stoneHeight = baseHeight + Math.random() * 0.05; 
        const stoneGeo = createNaturalPondStone(stoneLen, stoneWidth, stoneHeight);
        const mat = getRandomPondStoneMaterial();
        const stone = new THREE.Mesh(stoneGeo, mat);
        applyShadows(stone);
        const offsetAmount = (Math.random() - 0.5) * (stoneWidth * 0.15);
        pos.add(normal.multiplyScalar(offsetAmount));
        const yOffset = (Math.random() - 0.5) * 0.02;
        stone.position.set(pos.x, yOffset, pos.z); 
        const angle = Math.atan2(-dir.z, dir.x);
        stone.rotation.y = angle + (Math.random() - 0.5) * 0.3;
        stone.rotation.x = (Math.random() - 0.5) * 0.15;
        stone.rotation.z = (Math.random() - 0.5) * 0.15;
        group.add(stone);
    }
    group.position.y = groundLevel;
    scene.add(group);
    placedObjects.push(group);
    let area = 0;
    for (let i = 0; i < pathPoints.length; i++) {
        let j = (i + 1) % pathPoints.length;
        area += pathPoints[i].x * pathPoints[j].z - pathPoints[j].x * pathPoints[i].z;
    }
    document.getElementById('stat-area-box').style.display = 'flex';
    document.getElementById('val-area').innerText = (Math.abs(area)/2).toFixed(2);
    if(currentLine) { fadingLines.push(currentLine); currentLine = null; }
    pathPoints = [];
    selectObject(group);
}
// --- 核心修复：生成一段标准的独立路缘石模型 ---
function createSingleCurbGeo(length = 1.0) {
    const width = 0.12;
    const height = 0.15;
    const radius = 0.03;
    const shape = new THREE.Shape();
    const w2 = width / 2;
    // 逆时针绘制截面 (底部平直，顶部圆角)
    shape.moveTo(-w2, 0);
    shape.lineTo(w2, 0);
    shape.lineTo(w2, height - radius);
    shape.quadraticCurveTo(w2, height, w2 - radius, height);
    shape.lineTo(-w2 + radius, height);
    shape.quadraticCurveTo(-w2, height, -w2, height - radius);
    shape.lineTo(-w2, 0);
    const extrudeSettings = {
        steps: 1,
        depth: length,
        bevelEnabled: false
    };
    const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    // 将几何体中心移到 Z=0，方便旋转对齐
    geo.translate(0, 0, -length / 2);
    return geo;
}
function createCurbLatheGeo(radius, width, height, cornerRadius) {
    const pts = [];
    const x0 = radius - width/2;
    const x1 = radius + width/2;
    const segments = 6;
    pts.push(new THREE.Vector2(x0, 0));
    for(let i=segments; i>=0; i--) {
        const a = Math.PI/2 + (i/segments) * Math.PI/2; 
        pts.push(new THREE.Vector2(x0 + cornerRadius + Math.cos(a)*cornerRadius, height - cornerRadius + Math.sin(a)*cornerRadius));
    }
    for(let i=segments; i>=0; i--) {
        const a = (i/segments) * Math.PI/2; 
        pts.push(new THREE.Vector2(x1 - cornerRadius + Math.cos(a)*cornerRadius, height - cornerRadius + Math.sin(a)*cornerRadius));
    }
    pts.push(new THREE.Vector2(x1, 0));
    pts.push(new THREE.Vector2(x0, 0));
    const geo = new THREE.LatheGeometry(pts, 64);
    geo.computeVertexNormals();
    return geo;
}
// --- 核心修复：按分段拼接法生成路缘石，彻底解决穿模 ---
function generateCurbWithFill() {
    if (pathPoints.length < 3) return;
    const group = new THREE.Group();
    group.userData.isPaving = true;
    group.userData.isCurbWithFill = true;
    group.userData.assetId = currentAsset.id;
    group.userData.fillId = currentAsset.fillId;
    group.userData.points = pathPoints.map(p => ({x:p.x, y:p.y-groundLevel, z:p.z}));
    // 获取用户设置的单段长度，默认1000mm
    const segmentLen = (parseFloat(document.getElementById('path-spacing').value) || 1000) / 1000;
    group.userData.spacing = segmentLen;
    // 1. 生成内部填充物平面
    const pts2d = pathPoints.map(p => new THREE.Vector2(p.x, p.z));
    const shape = new THREE.Shape(pts2d);
    const fillGeo = new THREE.ShapeGeometry(shape);
    let fillMat;
    if (currentAsset.fillId === 'grass') {
        fillMat = new THREE.MeshStandardMaterial({ map: createAdvancedNoiseTexture('#1a4314', '#2d5a27', 'grass'), roughness: 0.9, side: THREE.DoubleSide });
    } else if (currentAsset.fillId === 'dirt') {
        fillMat = MATS.dirt;
    } else {
        fillMat = new THREE.MeshStandardMaterial({ map: createAdvancedNoiseTexture('#555555', '#777777', 'stone'), roughness: 0.9, side: THREE.DoubleSide });
    }
    const fillMesh = new THREE.Mesh(fillGeo, fillMat);
    fillMesh.rotation.x = Math.PI / 2;
    fillMesh.position.y = 0.12; // 嵌在路缘石内部
    fillMesh.receiveShadow = true;
    group.add(fillMesh);
    // 2. 沿着路径分段放置独立的标准路缘石模型
    const closedPoints = [...pathPoints, pathPoints[0]];
    for (let i = 0; i < closedPoints.length - 1; i++) {
        const p1 = closedPoints[i];
        const p2 = closedPoints[i+1];
        const dist = p1.distanceTo(p2);
        if (dist < 0.01) continue;
        const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
        const angle = Math.atan2(dir.x, dir.z); // 计算朝向
        // 计算这段线段需要多少个路缘石
        const count = Math.max(1, Math.round(dist / segmentLen));
        const actualLen = dist / count; // 稍微拉伸或缩短以完美填满线段
        const curbGeo = createSingleCurbGeo(actualLen);
        for (let j = 0; j < count; j++) {
            const curbMesh = new THREE.Mesh(curbGeo, MATS.curbStone);
            // 计算中心点位置
            const centerPos = p1.clone().add(dir.clone().multiplyScalar(actualLen * (j + 0.5)));
            curbMesh.position.set(centerPos.x, 0, centerPos.z);
            // 旋转使其对齐路径
            curbMesh.rotation.y = angle;
            applyShadows(curbMesh);
            group.add(curbMesh);
        }
    }
    group.position.y = groundLevel;
    scene.add(group);
    placedObjects.push(group);
    let area = 0;
    for (let i = 0; i < pathPoints.length; i++) {
        let j = (i + 1) % pathPoints.length;
        area += pathPoints[i].x * pathPoints[j].z - pathPoints[j].x * pathPoints[i].z;
    }
    document.getElementById('stat-area-box').style.display = 'flex';
    document.getElementById('val-area').innerText = (Math.abs(area)/2).toFixed(2);
    if(currentLine) { fadingLines.push(currentLine); currentLine = null; }
    pathPoints = [];
    selectObject(group);
}
function generateTreePool() {
    let centerPt = null;
    if (lastHitPose) { 
        centerPt = new THREE.Vector3(lastHitPose.transform.position.x, groundLevel, lastHitPose.transform.position.z); 
    } else { 
        let groundPt = new THREE.Vector3(); 
        let tempPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -groundLevel); 
        mouse.x = 0; mouse.y = 0; 
        raycaster.setFromCamera(mouse, camera);
        if(raycaster.ray.intersectPlane(tempPlane, groundPt)) centerPt = groundPt; 
    }
    if (!centerPt) return;
    const diameterStr = document.getElementById('tree-pool-diameter').value;
    const diameter = parseFloat(diameterStr) / 1000; 
    if (isNaN(diameter) || diameter <= 0) return;
    const radius = diameter / 2;
    const group = new THREE.Group();
    group.userData.isModel = true; 
    group.userData.id = 'tree_pool';
    const circleGeo = new THREE.CircleGeometry(radius, 32);
    const dirtMesh = new THREE.Mesh(circleGeo, MATS.dirt);
    dirtMesh.rotation.x = -Math.PI / 2;
    dirtMesh.position.y = 0.12; 
    dirtMesh.receiveShadow = true;
    group.add(dirtMesh);
    const curbWidth = 0.12;
    const curbHeight = 0.15;
    const curbRadius = 0.03;
    const curbGeo = createCurbLatheGeo(radius, curbWidth, curbHeight, curbRadius);
    const curbMesh = new THREE.Mesh(curbGeo, MATS.curbStone);
    curbMesh.position.y = 0; 
    applyShadows(curbMesh);
    group.add(curbMesh);
    group.position.copy(centerPt);
    scene.add(group);
    placedObjects.push(group);
    selectObject(group);
}
function generateContinuousRailing() {
    if (pathPoints.length < 2) return;
    const fenceGroup = new THREE.Group(); fenceGroup.userData.isPaving = true; fenceGroup.userData.isFence = true;
    fenceGroup.userData.points = pathPoints.map(p => ({x:p.x, y:p.y-groundLevel, z:p.z}));
    const userSegmentWidth = (parseFloat(document.getElementById('path-spacing').value) || 1600) / 1000;
    fenceGroup.userData.spacing = userSegmentWidth;
    for (let i = 0; i < pathPoints.length - 1; i++) {
        const p1 = pathPoints[i]; const p2 = pathPoints[i+1];
        const dist = p1.distanceTo(p2); const dir = new THREE.Vector3().subVectors(p2, p1).normalize(); const angle = Math.atan2(dir.x, dir.z);
        const count = Math.max(1, Math.round(dist / userSegmentWidth)); const actualWidth = dist / count;
        for (let j = 0; j < count; j++) {
            const segment = getModelGeometry('railing'); applyShadows(segment);
            segment.scale.set(actualWidth / 1.6, 1.0, 1.0); segment.position.copy(p1).add(dir.clone().multiplyScalar(actualWidth * (j + 0.5)));
            segment.rotation.y = angle + Math.PI/2; fenceGroup.add(segment);
        }
    }
    fenceGroup.position.y = groundLevel; scene.add(fenceGroup); placedObjects.push(fenceGroup);
    if(currentLine) { fadingLines.push(currentLine); currentLine = null; }
    pathPoints = []; selectObject(fenceGroup);
}
function generatePathModels() {
    if (pathPoints.length < 2) return;
    const group = new THREE.Group(); group.userData.isPaving = true; group.userData.isPathObj = true; group.userData.modelId = currentAsset.modelId;
    group.userData.points = pathPoints.map(p => ({x:p.x, y:p.y-groundLevel, z:p.z}));
    const spacingM = (parseFloat(document.getElementById('path-spacing').value) || 800) / 1000; group.userData.spacing = spacingM;
    let totalLen = 0; let segmentLengths = [0];
    for(let i=0; i<pathPoints.length-1; i++) { totalLen += pathPoints[i].distanceTo(pathPoints[i+1]); segmentLengths.push(totalLen); }
    for (let currentDist = 0; currentDist <= totalLen; currentDist += spacingM) {
        let segIdx = 0; for(let i=0; i<segmentLengths.length-1; i++) { if(currentDist >= segmentLengths[i] && currentDist <= segmentLengths[i+1]) { segIdx = i; break; } }
        const p1 = pathPoints[segIdx]; const p2 = pathPoints[segIdx+1];
        const t = (currentDist - segmentLengths[segIdx]) / (p1.distanceTo(p2) || 1);
        const model = getModelGeometry(currentAsset.modelId); applyShadows(model);
        model.position.lerpVectors(p1, p2, t); model.position.y = 0; model.rotation.y = Math.random() * Math.PI * 2; group.add(model);
    }
    group.position.y = groundLevel; scene.add(group); placedObjects.push(group);
    if(currentLine) { fadingLines.push(currentLine); currentLine = null; }
    pathPoints = []; selectObject(group);
}
function generatePaving() {
    if (pathPoints.length < 3) return;
    const pts2d = pathPoints.map(p => new THREE.Vector2(p.x, p.z));
    const shape = new THREE.Shape(pts2d); const geo = new THREE.ShapeGeometry(shape);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial());
    mesh.rotation.x = Math.PI / 2; mesh.position.y = groundLevel + 0.002; mesh.receiveShadow = true;
    mesh.userData.isPaving = true; mesh.userData.points = pathPoints.map(p => ({x:p.x, y:p.y-groundLevel, z:p.z}));
    updatePavingMaterial(mesh, currentAsset);
    scene.add(mesh); placedObjects.push(mesh);
    let area = 0; for (let i = 0; i < pathPoints.length; i++) { let j = (i + 1) % pathPoints.length; area += pathPoints[i].x * pathPoints[j].z - pathPoints[j].x * pathPoints[i].z; }
    document.getElementById('stat-area-box').style.display = 'flex'; document.getElementById('val-area').innerText = (Math.abs(area)/2).toFixed(2);
    if(currentLine) { fadingLines.push(currentLine); currentLine = null; }
    pathPoints = []; selectObject(mesh);
}
function updatePreviewLine() {
    if (currentLine) scene.remove(currentLine); if (pathPoints.length < 2) return;
    const geo = new THREE.BufferGeometry().setFromPoints(pathPoints);
    currentLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x2ecc71, linewidth: 8 })); scene.add(currentLine);
    let len = 0; for(let i=1; i<pathPoints.length; i++) len += pathPoints[i].distanceTo(pathPoints[i-1]);
    document.getElementById('val-len').innerText = (len * 1000).toFixed(0);
}
function updateUI(activeTab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); activeTab.classList.add('active');
    document.getElementById('path-tools').style.display = currentMode === 'path' ? 'flex' : 'none';
    const btnDraw = document.getElementById('btn-draw');
    if (currentMode === 'path') { btnDraw.innerText = "🔘 按住画线"; } else { btnDraw.innerText = "🔘 点击放置"; }
}
function renderAssetList() {
    const list = document.getElementById('asset-list'); list.innerHTML = '';
    ASSETS[currentMode].forEach(asset => {
        const card = document.createElement('div'); card.className = `asset-card ${currentAsset.id === asset.id ? 'active' : ''}`;
        card.innerHTML = `<div class="asset-box">${asset.icon}</div><div class="asset-name" title="${asset.name}">${asset.name}</div>`;
        card.onclick = () => { 
            currentAsset = asset; renderAssetList(); 
            const ctrl = document.getElementById('spacing-ctrl'); const label = document.getElementById('spacing-label'); const input = document.getElementById('path-spacing');
            if (asset.isFence || asset.isCurbWithFill) { 
                ctrl.style.display = 'flex'; label.innerText = "单段长"; input.value = 1000; 
            }
            else if (asset.isPondWithEdge) { 
                ctrl.style.display = 'flex'; label.innerText = "间距"; input.value = 250; 
            }
            else if (asset.isPathObj) { 
                ctrl.style.display = 'flex'; label.innerText = "间距"; 
                if (asset.id === 'path_grass_tall' || asset.id === 'path_grass_flower' || asset.id === 'path_grass_wind' || asset.id === 'path_grass_wind_flower') input.value = 150;
                else if (asset.id === 'path_lotus') input.value = 400; else if (asset.id === 'path_flat_stone') input.value = 200;
                else if (asset.id.includes('tree') || asset.id === 'path_bamboo') input.value = 3000;
                else input.value = 800; 
            } else { ctrl.style.display = 'none'; }
            if(selectedObj && selectedObj.userData.isPaving && currentMode === 'path' && !asset.isFence && !asset.isPathObj && !selectedObj.userData.isPondWithEdge && !selectedObj.userData.isCurbWithFill) updatePavingMaterial(selectedObj, currentAsset);
        };
        list.appendChild(card);
    });
}
